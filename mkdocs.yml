site_name: vero的小窝
site_url: https://veronalo.github.io
repo_url: https://github.com/veronalo/veronalo.github.io
theme:
  name: 'material'
  language: zh
  custom_dir: overrides
  logo: assets/logo2.png
  favicon: assets/logo2.png
  palette:
    # 手动日间模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 日间模式
    # 手动夜间模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: 夜间模式
  features:
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.footer
    - header.autohide
  icon:
    repo: fontawesome/brands/github
extra_css:
  - css/custom.css

nav:
  - Home: index.md
  - Notes:
    - ZJU: 
      - 目录: notes/notes.md
      - ISEE理论课:
        - 概述: notes/isee/isee.md
        - 信息与电子工程导论: notes/isee/isee_intro.md
        - 电子电路基础: notes/isee/ec.md
        - 集成电路导论: notes/isee/ic_intro.md
        - 半导体物理: notes/isee/semiconductorfundamentals.md
        - 信号与系统: notes/isee/signal&system.md
      - 实验课:
        - 电子工程训练: notes/experiment/dgx.md
        - 普通物理学实验I: notes/experiment/generalphy.md
        - 电子电路设计实验I: notes/experiment/dssy1.md
      - 通识好课:
        - 清代文化史: notes/common/qing.md
        - 航空航天导论: notes/common/aa.md
        - 心理学及应用: notes/common/psy.md
        - 法语I: notes/common/francais.md
      - 机器人:
        - 机器人导论: notes/robot/robotintro.md
        - 机器人基础实践: notes/robot/robotexp.md
      - 化学:
        - 普通化学: notes/chemisty/generalchemisty.md
  - Projects:
    - 目录: projects/projects.md
  - Momento: 
    - Momento: momento/index.md
    - 2026.5.31 日落: momento/2026-05-31-sunset.md
    - 2026.4.26 海宁: momento/2026-04-26-haining.md
    - 2026.4.11 写真: momento/2026-04-11-photo.md    
    - 2026.4.4 : momento/2026-04-04-scarymovies.md
    - 2026.3.28 油菜花...: momento/2026-03-28-youcaihua.md
    - 2026.1.23 鼓浪屿...: momento/2026-01-23-sunset&afterglow.md
    - 2026.1.20 西湖边...: momento/2026-01-20-westlake.md
    - 2026.1.15 : momento/2026-01-15-wanna kiss you.md
    - 2025.12.31: momento/2025-12-31-our story begins.md
    - 2025.12.10: momento/2025-12-10-chat.md
  - Thoughts:
    - Thoughts: thoughts/index.md
  - Friends: friends.md
  - About: about.md
    

plugins:
  - search
  - statistics:
      page_template: statistics.html
      page_read_time: true
      page_images: false
  - encryptcontent: 
      summary: '请输入密码以访问此内容'               # 加密内容的摘要信息[reference:1]
      placeholder: 'hint：你身份证上的生日（8位）'                   # 密码输入框内的占位文本[reference:2]
      decryption_failure_message: '密码错误，请再试试' # 密码输入错误时的提示[reference:3]
      title_prefix: '🔒 [LOCK]'                     # 页面标题的前缀[reference:4]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
