site_name: vero的小窝
site_url: https://veronalo.github.io
repo_url: https://github.com/veronalo/veronalo.github.io
theme:
  name: 'material'
  language: zh
  palette:
    # 手动日间模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 日间模式
    # 手动夜间模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: 夜间模式
  features:
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
  icon:
    repo: fontawesome/brands/github
extra_css:
  - css/custom.css

nav:
  - Home: index.md
  - About: about.md
  - Notes: notes.md
  - Momento:
    - 2026.4.4 : 2026-04-04-scarymovies.md
    - 2026.3.28 油菜花...: 2026-03-28-youcaihua.md
    - 2026.1.23 鼓浪屿...: 2026-01-23-sunset&afterglow.md
    - 2026.1.20 西湖边...: 2026-01-20-westlake.md
    - 2026.1.15 : 2026-01-15-wanna kiss you.md
    - 2025.12.31: 2025-12-31-our story begins.md
    
    